<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Success</title>
  <style>
    :root {
      --bg1: #0b1220;
      --bg2: #111b33;
      --card: rgba(255, 255, 255, 0.08);
      --cardBorder: rgba(255, 255, 255, 0.18);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.7);
      --accent: #7c5cff;
      --accent2: #22d3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(124, 92, 255, 0.35), transparent 55%),
        radial-gradient(900px 500px at 80% 20%, rgba(34, 211, 238, 0.28), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    .wrap { width: 100%; max-width: 520px; }

    .glass {
      background: var(--card);
      border: 1px solid var(--cardBorder);
      box-shadow:
        0 20px 70px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 18px;
      padding: 22px;
      text-align: center;
    }

    h1 { margin: 0 0 8px; font-size: 1.6rem; }
    p { margin: 0; color: var(--muted); }

    .btn {
      margin-top: 18px;
      display: inline-block;
      text-decoration: none;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      color: white;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 12px 30px rgba(124, 92, 255, 0.25);
    }

    .check {
      width: 56px;
      height: 56px;
      border-radius: 999px;
      margin: 6px auto 14px;
      display: grid;
      place-items: center;
      background: rgba(34, 211, 238, 0.15);
      border: 1px solid rgba(34, 211, 238, 0.25);
      font-size: 1.8rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="glass">
      <div class="check">✓</div>
      <h1>Registration Successful</h1>
      <p>Your registration has been saved.</p>
      <a class="btn" href="{% url 'event_registration' %}">Register Another</a>
    </div>
  </div>
</body>
</html>
